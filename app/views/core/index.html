<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./../../assets/css/bootstrap.min.css">
    <title>Study APP</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-sm bg-light navbar-light">
      <div class="container-fluid">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" data-page="home" href="#">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-page="login" href="#">Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-page="about" href="#">About</a>
          </li>
        </ul>
      </div>
    </nav>
    
    <div id="content-area" class="container"></div>

    <script src="./../../assets/js/jquery-3.7.1.js"></script>
    <script src="./../../assets/js/bootstrap.bundle.min.js"></script>
    <script src="./../../control/core.js"></script>
    <script src="./../../control/page-controller.js"></script>
    
    <script>
      // Wait for DOM to be ready
      document.addEventListener('DOMContentLoaded', function() {
        console.log('DOM loaded, initializing app...');
        
        // Check if pageController is available
        if (typeof pageController === 'undefined') {
          console.error('pageController not loaded!');
          return;
        }
        
        // Navigation click handlers
        document.querySelectorAll('.nav-link').forEach(link => {
          link.addEventListener('click', function(e) {
            e.preventDefault();
            const page = this.dataset.page;
            
            console.log(`Navigation clicked: ${page}`);
            
            // Handle logout specially
            if (page === 'logout') {
              const result = CoreController.logout();
              if (result.success) {
                // Update nav
                const loginLink = document.querySelector('.nav-link[data-page="logout"]');
                if (loginLink) {
                  loginLink.textContent = 'Login';
                  loginLink.dataset.page = 'login';
                }
                pageController.loadPage('home');
              }
              return;
            }
            
            if (page) {
              pageController.loadPage(page);
            }
          });
        });
        
        // Load default page
        pageController.loadPage('home');
        
        // Check login status on startup
        const isLoggedIn = CoreController.isItLoged();
        if (isLoggedIn) {
          const loginLink = document.querySelector('.nav-link[data-page="login"]');
          if (loginLink) {
            loginLink.textContent = 'Logout';
            loginLink.dataset.page = 'logout';
          }
        }
      });
    </script>
  </body>
</html>
