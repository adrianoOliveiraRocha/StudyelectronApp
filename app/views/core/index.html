<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./../../assets/css/bootstrap.min.css">
    <title>Study APP</title>
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-sm bg-light navbar-light">
      <div class="container-fluid">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" data-page="home" href="#">User</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-page="login" href="#">Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-page="about" href="#">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-page="otherPage" href="#">Other Page</a>
          </li>
        </ul>
      </div>
    </nav>
    
    <div id="content-area" class="container"></div>

    <script src="./../../assets/js/jquery-3.7.1.js"></script>
    <script src="./../../assets/js/bootstrap.bundle.min.js"></script>
    <script src="./../../control/core.js"></script>
    <script src="./../../control/page-controller.js"></script>
    
    <script>
      // ============ INITIALIZATION ============
      document.addEventListener('DOMContentLoaded', function() {
        // Add click listeners to nav links
        document.querySelectorAll('.nav-link').forEach(link => {
          link.addEventListener('click', function(e) {
            e.preventDefault();
            const page = this.dataset.page;
            if (page) {
              pageController.loadPage(page);
            }
          });
        });
        
        // Load default page
        pageController.loadPage('home');
      });
    </script>
  </body>
</html>
