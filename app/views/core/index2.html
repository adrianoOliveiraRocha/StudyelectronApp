<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./../../assets/css/bootstrap.min.css">
    <title>Study APP</title>
  </head>
  <body>
    <!-- Fixed Navigation -->
    <nav class="navbar navbar-expand-sm bg-light navbar-light">
      <div class="container-fluid">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" data-page="home" href="#">User</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-page="login" href="#">Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-page="about" href="#">About</a>
          </li>
        </ul>
      </div>
    </nav>
    
    <!-- Dynamic Content Area -->
    <div id="content-area" class="container">
      <!-- Content will be loaded here -->
    </div>

    <script src="./../../assets/js/jquery-3.7.1.js"></script>
    <script src="./../../assets/js/bootstrap.bundle.min.js"></script>
    <script src="./../../control/core.js"></script>
    
    <script>
      // Page loader
      const contentArea = document.getElementById('content-area');
      
      // Define pages
      const pages = {
        home: `
          <hr>
          <div class="card text-primary">
            <div class="card-body">Home</div>
          </div>
          <hr>
        `,
        login: `
          <hr>
          <div class="card">
            <div class="card-body">
              <h3>Login</h3>
              <form>
                <div class="mb-3">
                  <label>Email</label>
                  <input type="email" class="form-control">
                </div>
                <div class="mb-3">
                  <label>Password</label>
                  <input type="password" class="form-control">
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
              </form>
            </div>
          </div>
          <hr>
        `,
        about: `
          <hr>
          <div class="card">
            <div class="card-body">
              <h3>About</h3>
              <p>This is a desktop application built with Electron</p>
            </div>
          </div>
          <hr>
        `
      };
      
      // Load page function
      function loadPage(page) {
        // Update active nav
        document.querySelectorAll('.nav-link').forEach(link => {
          link.classList.remove('active');
          if (link.dataset.page === page) {
            link.classList.add('active');
          }
        });
        
        // Load content
        if (pages[page]) {
          contentArea.innerHTML = pages[page];
        } else {
          contentArea.innerHTML = '<h1>Page not found</h1>';
        }
      }
      
      // Navigation click handler
      document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const page = link.dataset.page;
          if (page) {
            loadPage(page);
          }
        });
      });
      
      // Load default page
      loadPage('home');
    </script>
  </body>
</html>
